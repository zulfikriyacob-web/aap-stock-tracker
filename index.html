<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1d4a7a">
<title>AAP Stock Tracker — DM Line</title>
<style>
  :root{
    --bg:#0f1419; --surface:#1a2330; --surface2:#222d3d; --line:#2d3a4d;
    --text:#e8edf3; --muted:#8a98ac; --faint:#5a6878;
    --blue:#3b82d6; --blue-bg:#16293f;
    --amber:#e0992c; --amber-bg:#322611;
    --green:#4ca866; --green-bg:#152a1c;
    --in:#4ca866; --in-bg:#152a1c;
    --out:#d65a4c; --out-bg:#341813;
    --info:#3b82d6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100vh;
    font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;}
  .mono{font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;}
  /* Header */
  .hdr{background:var(--surface);border-bottom:1px solid var(--line);padding:12px 16px;
    position:sticky;top:0;z-index:20;}
  .hdr .eyebrow{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
  .hdr .title{font-size:16px;font-weight:600;margin-top:2px;display:flex;align-items:center;justify-content:space-between;}
  .conn{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
  .dot.on{background:var(--green);} .dot.off{background:var(--out);}
  /* Tabs */
  .tabs{display:grid;grid-template-columns:repeat(6,1fr);background:var(--surface2);
    border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:19;}
  .tab{padding:9px 1px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:3px;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit;position:relative;}
  .tab span{font-size:9.5px;}
  .tab .dot{position:absolute;top:6px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:var(--out);}
  /* ---- Plan tab ---- */
  .alert-bar{background:var(--out-bg);border:1px solid var(--out);border-radius:11px;padding:12px 14px;margin-bottom:12px;}
  .alert-bar b{color:var(--out);font-size:13px;display:block;margin-bottom:3px;}
  .alert-bar p{margin:0;font-size:12px;color:var(--text);line-height:1.5;}
  .ftab{width:100%;border-collapse:collapse;font-size:12px;}
  .ftab th{background:var(--surface2);color:var(--muted);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;
    padding:7px 6px;text-align:left;border-bottom:1px solid var(--line);}
  .ftab td{padding:7px 6px;border-bottom:1px solid var(--line);color:var(--text);}
  .ftab tr.warn td{background:var(--amber-bg);color:var(--amber);}
  .ftab tr.crit td{background:var(--out-bg);color:var(--out);font-weight:600;}
  .ftab tr.ship td{background:var(--blue-bg);}
  .ftab .num{text-align:right;font-variant-numeric:tabular-nums;}
  .mini{font-size:11px;color:var(--muted);margin:6px 0 0;}
  .btn-sm{padding:9px;font-size:13px;border-radius:9px;}
  .tab.active{color:var(--text);border-bottom-color:var(--text);}
  .tab svg{width:18px;height:18px;}
  .tab span{font-size:8.5px;font-weight:600;letter-spacing:.2px;}
  /* Content */
  .content{padding:14px 12px 40px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  .lbl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
  input,select{width:100%;box-sizing:border-box;height:46px;padding:0 14px;border-radius:9px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);font-size:15px;font-family:inherit;outline:none;
    -webkit-appearance:none;appearance:none;}
  input[type=date]{line-height:46px;padding-top:0;padding-bottom:0;}
  input:focus,select:focus{border-color:var(--blue);}
  input::placeholder{color:var(--faint);}
  .btn{padding:14px;border-radius:11px;border:none;font-size:15px;font-weight:600;cursor:pointer;
    width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:var(--text);color:var(--bg);}
  .btn-primary:active{transform:scale(.985);}
  .seg{display:grid;gap:8px;}
  .seg-btn{padding:12px 4px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;
    background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-family:inherit;text-align:center;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  /* Balance card */
  .bal-card{border-left:3px solid;padding-left:11px;}
  .bal-num{font-size:38px;font-weight:600;line-height:1;}
  .stat{padding:8px 10px;border-radius:9px;}
  .stat p{margin:0;}
  .stat .k{font-size:9px;letter-spacing:.8px;text-transform:uppercase;}
  .stat .v{font-size:18px;font-weight:600;margin-top:2px;}
  .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.5px;}
  .pill{padding:6px 14px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
    background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:inherit;}
  .pill.active{background:var(--text);color:var(--bg);}
  /* Qty stepper */
  .qty-row{display:flex;gap:8px;align-items:center;}
  .qty-btn{width:52px;height:52px;flex-shrink:0;background:var(--surface2);border:1px solid var(--line);
    border-radius:9px;color:var(--text);font-size:24px;cursor:pointer;font-family:inherit;}
  .qty-input{flex:1;text-align:center;font-size:26px;font-weight:600;padding:10px;}
  /* Toast */
  .toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:10px;
    font-size:13px;font-weight:600;z-index:50;white-space:nowrap;display:none;max-width:90%;}
  .toast.show{display:block;animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:transl(-50%,-8px);}to{opacity:1;}}
  /* Table */
  table{width:100%;border-collapse:collapse;table-layout:fixed;}
  th{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    padding:8px 5px;border-bottom:1px solid var(--line);}
  td{padding:9px 5px;font-size:12px;border-bottom:1px solid var(--line);}
  tfoot td{border-top:1px solid var(--faint);border-bottom:none;font-weight:600;padding-top:10px;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty{text-align:center;padding:40px 14px;color:var(--muted);}
  .empty svg{width:34px;height:34px;opacity:.4;margin-bottom:8px;}
  .setup-warn{background:var(--out-bg);border:1px solid var(--out);color:#f0a99e;border-radius:10px;
    padding:12px 14px;font-size:12px;margin-bottom:12px;line-height:1.5;}
</style>
</head>
<body>

<!-- ============ TUKAR URL INI ============ -->
<script>
  // ⚠️ PENTING: Ganti dengan URL Web App dari Google Apps Script anda
  // (Lihat SETUP_GUIDE.md, Step 5). Format: https://script.google.com/macros/s/XXXX/exec
  var API_URL = "https://script.google.com/macros/s/AKfycbwz3US4NBf3skmiQN2IU348NT1m45NfK-5JnjQJG000Eb8hdq752_PrA35cfVZx9a31Uw/exec";
</script>
<!-- ======================================= -->

<div class="hdr">
  <div class="eyebrow">Armstrong Auto Parts SBM · Honda Lock Section </div>
  <div class="title">
    <span>Consumable Stock Tracker</span>
    <span class="conn"><span class="dot" id="connDot"></span><span id="connTxt" style="color:var(--muted)">…</span></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="home" onclick="go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    <span>Home</span>
  </button>
  <button class="tab" data-tab="record" onclick="go('record')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Record</span>
  </button>
  <button class="tab" data-tab="edit" onclick="go('edit')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
    <span>Tukar Data</span>
  </button>
  <button class="tab" data-tab="plan" onclick="go('plan')" id="tabPlan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    <span>Plan</span>
  </button>
  <button class="tab" data-tab="history" onclick="go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.3 2.6L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 3"/></svg>
    <span>History</span>
  </button>
  <button class="tab" data-tab="report" onclick="go('report')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Report</span>
  </button>
</div>

<div class="content" id="content"></div>
<div class="toast" id="toast"></div>

<script>
// ============ CONFIG ============
var MATERIALS = [
  { id:"Bubble Wrap",  unit:"bag",   color:"var(--blue)",  bg:"var(--blue-bg)",  pcsPerUnit:200,  subUnit:"pcs", dailyUsage:4 },
  { id:"Glue Tribond", unit:"tubes", color:"var(--amber)", bg:"var(--amber-bg)", pcsPerUnit:1020, subUnit:"pcs", dailyUsage:1 },
  { id:"NPC Grease",   unit:"pail",  color:"var(--green)", bg:"var(--green-bg)", pcsPerUnit:15,   subUnit:"kg", dailyUsage:0.5 }
];
// Nota: dailyUsage = anggaran guna sehari (default) untuk satu line jalan.
//   Bubble 4 bag · Glue 1 tube · Grease 0.5 (kg/hari, dalam unit pail = 0.5kg).
//   Disimpan untuk kegunaan dashboard akan datang (forecast / reorder estimate).
// ---- Tab PLAN: material yang di-cover (buat masa ni Bubble Wrap sahaja) ----
var PLAN_MATERIAL = "Bubble Wrap";
var PLAN_DEFAULTS = { safetyStock:12, shipmentSize:15, leadTime:10, alertEmail:"" };
var PLAN_HORIZON = 45; // berapa hari kerja nak unjur ke depan

var LINES = ["Door Mirror","Outer Handle","Pass Thru","Open Stay","Stock Baru Masuk","Other"];
var SHIFTS = ["Morning","Afternoon","Night"];
var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ============ STATE ============
var state = {
  tab:"home", records:[], openings:{}, loading:true, online:false,
  form:{ material:"Bubble Wrap", date:today(), shift:"Morning", line:"L1 DM", operator:"", type:"OUT", qty:"", remarks:"" },
  histFilter:"all", repMat:"Bubble Wrap", repView:"weekly", saving:false, editDate:today(),
  // ---- tab Plan ----
  config:{}, plan:[], delivery:[], planSection:"forecast",
  planForm:{ from:today(), to:"", pcs:"700" }
};

function today(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return String(n).padStart(2,"0");}
function mKey(ds){return ds.slice(0,7);}
function dayName(ds){return DAYS[new Date(ds+"T12:00:00").getDay()];}
function mat(id){return MATERIALS.find(function(m){return m.id===id;});}
// Papar nombor kemas: 15 -> "15", 12.4 -> "12.4"
function fmt(n){n=Number(n)||0;return (Math.round(n*10)/10).toString();}
// Pulangkan string "= X pcs" kalau material ada conversion, else "".
function subQty(matId,qty){
  var m=mat(matId);
  if(!m||!m.pcsPerUnit||!qty)return "";
  return "= "+(qty*m.pcsPerUnit).toLocaleString()+" "+m.subUnit;
}

// Opening stock disimpan local kat phone (localStorage), sebab dia setup sekali je per bulan
function loadOpenings(){try{return JSON.parse(localStorage.getItem("aap_openings")||"{}");}catch(e){return {};}}
function saveOpenings(o){try{localStorage.setItem("aap_openings",JSON.stringify(o));}catch(e){}}

// ============ API ============
function apiList(){
  return fetch(API_URL+"?action=list").then(function(r){return r.json();});
}
function apiSave(rec){
  return fetch(API_URL,{method:"POST",body:JSON.stringify(rec)}).then(function(r){return r.json();});
}
function apiMeta(){
  return fetch(API_URL+"?action=meta").then(function(r){return r.json();});
}
function apiPost(obj){
  return fetch(API_URL,{method:"POST",body:JSON.stringify(obj)}).then(function(r){return r.json();});
}
function apiDeleteDelivery(id){
  return fetch(API_URL+"?action=deleteDelivery&id="+encodeURIComponent(id)).then(function(r){return r.json();});
}
function apiDelete(id){
  return fetch(API_URL+"?action=delete&id="+encodeURIComponent(id)).then(function(r){return r.json();});
}

function setConn(on){
  state.online=on;
  document.getElementById("connDot").className="dot "+(on?"on":"off");
  document.getElementById("connTxt").textContent=on?"ONLINE":"OFFLINE";
  document.getElementById("connTxt").style.color=on?"var(--green)":"var(--out)";
}

function refresh(){
  if(API_URL.indexOf("PASTE_")===0){state.loading=false;render();return;}
  return Promise.all([apiList(),apiMeta().catch(function(){return {ok:false};})])
    .then(function(res){
      var list=res[0], meta=res[1];
      if(list.ok){state.records=list.records||[];setConn(true);}
      else setConn(false);
      if(meta&&meta.ok)loadMeta(meta);
      state.loading=false;render();
    }).catch(function(){setConn(false);state.loading=false;render();});
}
function loadMeta(meta){
  state.config=meta.config||{};
  state.plan=meta.plan||[];
  state.delivery=meta.delivery||[];
}
// Config utk material Plan — guna nilai dari Sheet, fallback ke default.
function planCfg(){
  var c=state.config[PLAN_MATERIAL]||{};
  return {
    safetyStock: c.safetyStock||PLAN_DEFAULTS.safetyStock,
    shipmentSize: c.shipmentSize||PLAN_DEFAULTS.shipmentSize,
    leadTime: c.leadTime||PLAN_DEFAULTS.leadTime,
    alertEmail: c.alertEmail||PLAN_DEFAULTS.alertEmail
  };
}

// Manual sync — dipanggil bila user tekan button Sync. Bagi feedback jelas.
function doSync(btn){
  if(API_URL.indexOf("PASTE_")===0){toast("App belum disetup",false);return;}
  if(btn){btn.disabled=true;btn.dataset.busy="1";}
  var icon=btn&&btn.querySelector("svg");
  if(icon){icon.style.transition="transform .6s ease";icon.style.transform="rotate(360deg)";}
  var before=state.records.length;
  apiList().then(function(res){
    if(res.ok){
      state.records=res.records||[];setConn(true);
      var diff=state.records.length-before;
      if(diff>0)toast("Sync ✓ — "+diff+" rekod baru ditambah",true);
      else toast("Sync ✓ — data sudah terkini",true);
    }else{setConn(false);toast("Sync gagal — cuba lagi",false);}
    render();
  }).catch(function(){setConn(false);toast("Tiada internet — sync gagal",false);render();});
}

// Muat semula data dari Google Sheet (buang cache paparan, tarik fresh)
function resetLocal(){
  var yes=confirm("Muat semula semua data dari Google Sheet?\n\nIni akan tarik data terkini (termasuk opening stock & balance) dari Sheet.\n\nTeruskan?");
  if(!yes)return;
  try{localStorage.removeItem("aap_openings");}catch(e){}
  toast("Memuat semula…",true);
  apiList().then(function(res){
    if(res.ok){state.records=res.records||[];setConn(true);toast("Data dimuat semula ✓",true);}
    else{setConn(false);toast("Gagal muat semula",false);}
    go("home");
  }).catch(function(){setConn(false);toast("Tiada internet",false);});
}

// ============ CALC ============
// Cari entry OPENING terkini (paling lewat tarikh) utk satu material. Ni jadi "anchor".
function latestOpening(matId){
  var ops=state.records.filter(function(r){return r.material===matId&&r.type==="OPENING"&&r.date;});
  if(!ops.length)return null;
  ops.sort(function(a,b){ if(a.date!==b.date)return a.date<b.date?1:-1; return new Date(b.timestamp||0)-new Date(a.timestamp||0); });
  return ops[0]; // yang paling lewat
}
// Nilai opening stock semasa (qty dari anchor OPENING terkini).
function getOpening(matId){
  var op=latestOpening(matId);
  return op?Number(op.qty):undefined;
}
// Tarikh opening terkini.
function getOpeningDate(matId){
  var op=latestOpening(matId);
  return op?op.date:undefined;
}
// Baki pada tarikh 'end' — guna OPENING TERKINI yang <= end sebagai anchor.
// (Penting: opening selepas 'end' tidak boleh jadi anchor, kalau tidak baki sejarah jadi salah.)
function balanceAsOf(matId,end){
  end=end||today();
  var ops=state.records.filter(function(r){
    return r.material===matId&&r.type==="OPENING"&&r.date&&r.date<=end;
  });
  ops.sort(function(a,b){
    if(a.date!==b.date)return a.date<b.date?1:-1;
    return new Date(b.timestamp||0)-new Date(a.timestamp||0);
  });
  var base=ops.length?Number(ops[0].qty):0;
  var from=ops.length?ops[0].date:"0000-00-00";
  var recs=state.records.filter(function(r){
    return r.material===matId&&r.date&&r.date>=from&&r.date<=end&&(r.type==="IN"||r.type==="OUT");
  });
  var inT=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
  var outT=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
  return base+inT-outT;
}
// Balance = opening terkini + (IN − OUT) dari tarikh opening ke 'end'. Entry sebelum opening diabaikan.
function calcBalance(matId,end){
  return balanceAsOf(matId,end||today());
}
function todayStat(matId,type){
  return state.records.filter(function(r){return r.material===matId&&r.date===today()&&r.type===type;})
    .reduce(function(s,r){return s+Number(r.qty);},0);
}

// ============ NAV ============
function go(tab){
  state.tab=tab;
  var tabs=document.querySelectorAll(".tab");
  tabs.forEach(function(t){t.classList.toggle("active",t.dataset.tab===tab);});
  render();
}

function toast(msg,ok){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=ok?"var(--in-bg)":"var(--out-bg)";
  t.style.color=ok?"#9fe3b3":"#f0a99e";
  t.style.border="1px solid "+(ok?"var(--in)":"var(--out)");
  t.className="toast show";
  setTimeout(function(){t.className="toast";},2600);
}

// ============ RENDER ============
function render(){
  var c=document.getElementById("content");
  if(state.loading){c.innerHTML='<div class="empty"><div class="spinner" style="border-top-color:var(--blue);margin-bottom:10px"></div><p>Memuatkan data…</p></div>';return;}
  if(API_URL.indexOf("PASTE_")===0){
    c.innerHTML='<div class="setup-warn"><b>⚙️ Belum disetup</b><br>API_URL belum diisi. Buka file index.html, cari <code>PASTE_YOUR_APPS_SCRIPT_URL_HERE</code> dan ganti dengan URL Web App dari Google Apps Script anda. Lihat SETUP_GUIDE.md.</div>'+homeView();
    return;
  }
  if(state.tab==="home")c.innerHTML=homeView();
  else if(state.tab==="record")c.innerHTML=recordView();
  else if(state.tab==="edit")c.innerHTML=editView();
  else if(state.tab==="plan")c.innerHTML=planView();
  else if(state.tab==="history")c.innerHTML=historyView();
  else if(state.tab==="report")c.innerHTML=reportView();
  updatePlanBadge();
}

// Titik merah kat tab Plan bila baki <= safety stock
function updatePlanBadge(){
  var tab=document.getElementById("tabPlan");
  if(!tab)return;
  var old=tab.querySelector(".dot");
  if(old)old.remove();
  if(state.loading||!state.records.length)return;
  var cfg=planCfg();
  if(calcBalance(PLAN_MATERIAL)<=cfg.safetyStock){
    var d=document.createElement("span");
    d.className="dot";
    tab.appendChild(d);
  }
}

function homeView(){
  var now=new Date();
  var dateLbl=DAYS[now.getDay()]+", "+now.getDate()+" "+MONTHS[now.getMonth()]+" "+now.getFullYear();
  var html='<div class="card" style="display:flex;justify-content:space-between;align-items:center">'+
    '<div><span class="lbl">Hari ini</span><p class="mono" style="margin:0;font-size:14px;font-weight:600">'+dateLbl+'</p></div>'+

function stepQty(d){

function doSave(){
  var f=state.form;
  if(!f.operator.trim()){toast("Nama operator wajib diisi!",false);return;}
  var qty=parseFloat(f.qty);
  if(!qty||qty<=0){toast("Quantity tidak sah!",false);return;}
  var m=mat(f.material);
  var id=String(Date.now())+"_"+Math.floor(Math.random()*1000);
  var rec={id:id,material:f.material,type:f.type,qty:qty,unit:m.unit,line:f.line,shift:f.shift,operator:f.operator.trim(),date:f.date,remarks:f.remarks.trim()};
  var btn=document.getElementById("saveBtn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Menyimpan…';
  apiSave(rec).then(function(res){
    if(res.ok){
      state.records.push(Object.assign({timestamp:new Date().toISOString()},rec));
      state.form.qty="";state.form.remarks="";
      toast("Rekod berjaya disimpan ✓",true);
      setConn(true);go("home");
    }else{toast("Gagal: "+(res.error||"cuba lagi"),false);btn.disabled=false;render();}
  }).catch(function(){toast("Tiada internet — cuba lagi",false);setConn(false);btn.disabled=false;render();});
}

function editOpening(matId){
  var m=mat(matId);

  var val=prompt("Set opening stock untuk "+matId+":\n\nMasukkan baki sebenar dari stock check.\n\nNota: balance akan dikira BERMULA dari tarikh opening ni (entry sebelum tarikh ini diabaikan). Ganti opening sedia ada & sync ke Google Sheet.",cur!==undefined?cur:"");
  if(val===null)return;
  var n=parseFloat(val);if(isNaN(n)){toast("Nilai tidak sah",false);return;}
  // Minta tarikh opening (default: tarikh opening sedia ada, atau hari ni)
  var defDate=curDate||today();

  var id=String(Date.now())+"_"+Math.floor(Math.random()*1000);

  toast("Menyimpan opening…",true);
  apiSave(rec).then(function(res){
    if(res.ok){
      // buang OPENING tarikh SAMA je dari state (pembetulan), kekalkan sejarah lain
      state.records=state.records.filter(function(r){return !(r.material===matId&&r.type==="OPENING"&&r.date===dStr);});
      state.records.push(Object.assign({timestamp:new Date().toISOString()},rec));
      setConn(true);toast("Opening stock disimpan ✓",true);go("home");
    }else{toast("Gagal: "+(res.error||"cuba lagi"),false);}
  }).catch(function(){toast("Tiada internet — cuba lagi",false);setConn(false);});
}

function getWeekly(matId){
  var now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  var ms=y+"-"+pad(mo+1),dim=new Date(y,mo+1,0).getDate();
  // Baki bawa masuk dari bulan sebelum (bukan 0).
  var bal=balanceAsOf(matId,dAdd(ms+"-01",-1));
  var weeks=[[1,7],[8,14],[15,21],[22,28],[29,31]].filter(function(w){return w[0]<=dim;});
  return weeks.map(function(w,i){
    var from=ms+"-"+pad(w[0]),to=ms+"-"+pad(Math.min(w[1],dim));
    var recs=state.records.filter(function(r){return r.material===matId&&r.date>=from&&r.date<=to;});
    var opW=recs.filter(function(r){return r.type==="OPENING";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var hasOpW=recs.some(function(r){return r.type==="OPENING";});
    var tIn=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var tOut=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var open=hasOpW?opW:bal;
    bal=open+tIn-tOut;
    return {wk:i+1,s:w[0],e:Math.min(w[1],dim),open:open,tIn:tIn,tOut:tOut,close:bal,reset:hasOpW};
  });
}
function getDaily(matId){
  var now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  var ms=y+"-"+pad(mo+1),dim=new Date(y,mo+1,0).getDate();
  // Baki BAWA MASUK dari sebelum bulan ni (bukan 0) — kalau tidak, Report jadi negatif.
  var bal=balanceAsOf(matId,dAdd(ms+"-01",-1));
  var tdy=today(),out=[];
  for(var d=1;d<=dim;d++){
    var ds=ms+"-"+pad(d);
    var recs=state.records.filter(function(r){return r.material===matId&&r.date===ds;});
    var opDay=recs.filter(function(r){return r.type==="OPENING";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var hasOpDay=recs.some(function(r){return r.type==="OPENING";});
    var tIn=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var tOut=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var open=bal;
    // Kalau hari ni ada OPENING (stock check), RESET balance ke nilai opening, baru tolak/tambah IN/OUT hari tu.
    if(hasOpDay)bal=opDay+tIn-tOut;
    else bal=open+tIn-tOut;
    out.push({d:d,ds:ds,day:dayName(ds),open:hasOpDay?opDay:open,in:tIn,out:tOut,bal:bal,isToday:ds===tdy,reset:hasOpDay});
  }
  return out;
}

// ================= PLAN: enjin forecast =================
function dAdd(ds,n){var d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function isWorkday(ds){var w=new Date(ds+"T00:00:00").getDay();return w>=1&&w<=5;}

// Plan pcs utk satu tarikh. Kalau takde plan, guna purata plan sedia ada; kalau langsung takde, guna default.
function planPcsFor(ds){
  var hit=state.plan.filter(function(p){return p.material===PLAN_MATERIAL&&p.date===ds;});
  if(hit.length)return Number(hit[0].planPcs)||0;
  var all=state.plan.filter(function(p){return p.material===PLAN_MATERIAL&&p.planPcs>0;});
  if(all.length)return all.reduce(function(s,p){return s+Number(p.planPcs);},0)/all.length;
  return 0;
}
// Guna/hari dalam UNIT (bag) — dari plan pcs ÷ pcsPerUnit. Fallback ke dailyUsage material.
function usageFor(ds){
  var m=mat(PLAN_MATERIAL);
  var pcs=planPcsFor(ds);
  if(pcs>0&&m.pcsPerUnit)return pcs/m.pcsPerUnit;
  return m.dailyUsage||0;
}
function deliveryOn(ds){
  return state.delivery.filter(function(d){return d.material===PLAN_MATERIAL&&d.date===ds;})
    .reduce(function(s,d){return s+Number(d.qty);},0);
}

/**
 * Unjuran ke depan. Pulangkan { rows, suggest, runoutDate }
 *  rows   = [{ds,use,deliv,bal,warn,crit}]  (guna delivery yg DAH disimpan)
 *  suggest= [tarikh] cadangan bila supplier kena hantar (kalau ikut delivery sedia ada tak cukup)
 */
function forecast(){
  var cfg=planCfg();
  var bal=calcBalance(PLAN_MATERIAL);
  var simBal=bal;              // untuk cadangan (auto-ship)
  var rows=[], suggest=[], runout=null;
  var ds=today(), count=0, guard=0;

  while(count<PLAN_HORIZON&&guard<200){
    guard++;
    if(!isWorkday(ds)){ds=dAdd(ds,1);continue;}
    var use=usageFor(ds);
    var deliv=deliveryOn(ds);

    // baris sebenar (ikut delivery yang dah disimpan)
    bal=bal+deliv-use;
    if(bal<=0&&!runout)runout=ds;

    // simulasi cadangan: kalau baki akan jatuh bawah safety, shipment kena sampai hari ni
    var shipToday=0;
    var afterUse=simBal+deliv-use;
    if(afterUse<cfg.safetyStock&&cfg.shipmentSize>0){
      shipToday=cfg.shipmentSize;
      suggest.push(ds);
    }
    simBal=simBal+deliv+shipToday-use;

    rows.push({ds:ds,use:use,deliv:deliv,bal:bal,
      warn:(bal>0&&bal<=cfg.safetyStock),crit:(bal<=0)});
    count++; ds=dAdd(ds,1);
  }
  return {rows:rows,suggest:suggest,runout:runout,startBal:calcBalance(PLAN_MATERIAL),cfg:cfg};
}

// ================= PLAN: paparan =================
function planView(){
  var m=mat(PLAN_MATERIAL), f=forecast(), cfg=f.cfg;
  var bal=f.startBal;
  var avgUse=usageFor(today());
  var daysLeft=avgUse>0?(bal/avgUse):0;
  var status = bal<=0 ? "STOK HABIS" : (bal<=cfg.safetyStock ? "HANTAR SEGERA" : (bal<=cfg.safetyStock*1.3 ? "PANTAU" : "OK"));
  var sc = status==="OK"?"var(--green)":(status==="PANTAU"?"var(--amber)":"var(--out)");

  var h="";

  // ---- Alert banner ----
  if(bal<=cfg.safetyStock){
    h+='<div class="alert-bar"><b>⚠️ '+PLAN_MATERIAL+' bawah safety stock</b>'+
       '<p>Baki <b>'+fmt(bal)+' '+m.unit+'</b> · safety stock '+cfg.safetyStock+' '+m.unit+
       (avgUse>0?' · jangkaan habis dalam <b>'+Math.max(0,Math.floor(daysLeft))+' hari kerja</b>':'')+
       '<br>Sila buat work order / hubungi supplier.</p></div>';
  }

  // ---- Ringkasan ----
  h+='<div class="card">'+
     '<div class="row2" style="margin-bottom:10px">'+
       '<div><span class="lbl">Baki semasa</span><div class="mono" style="font-size:22px;font-weight:600;color:'+m.color+'">'+fmt(bal)+' <span style="font-size:12px;color:var(--muted)">'+m.unit+'</span></div></div>'+
       '<div><span class="lbl">Status</span><div style="font-size:15px;font-weight:600;color:'+sc+'">'+status+'</div></div>'+
     '</div>'+
     '<div class="row2">'+
       '<div><span class="lbl">Guna/hari (plan)</span><div class="mono">'+avgUse.toFixed(1)+' '+m.unit+'</div></div>'+
       '<div><span class="lbl">Hari lagi</span><div class="mono">'+(avgUse>0?Math.max(0,Math.floor(daysLeft))+" hari":"—")+'</div></div>'+
     '</div>'+
     (f.runout?'<p class="mini">⚠️ Stok jangkaan habis pada <b>'+f.runout+'</b> (kalau tiada delivery baru)</p>':'')+
     '</div>';

  // ---- Pills tukar seksyen ----
  var secs=[["forecast","Forecast"],["plan","Plan Produksi"],["delivery","Delivery"],["setting","Setting"]];
  h+='<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px">'+
     secs.map(function(s){
       var on=state.planSection===s[0];
       return '<button class="pill" onclick="state.planSection=\''+s[0]+'\';render()" style="'+
         (on?'background:var(--text);color:var(--bg);border-color:var(--text)':'')+'">'+s[1]+'</button>';
     }).join('')+'</div>';

  if(state.planSection==="forecast")      h+=planForecastSec(f,m);
  else if(state.planSection==="plan")     h+=planInputSec(m);
  else if(state.planSection==="delivery") h+=planDeliverySec(f,m);
  else                                    h+=planSettingSec(cfg,m);

  return h;
}

function planForecastSec(f,m){
  if(!f.rows.length)return '<div class="empty"><p>Tiada unjuran.</p></div>';
  var h='<div class="card"><span class="lbl">Unjuran baki — '+PLAN_MATERIAL+'</span>'+
    '<div style="overflow-x:auto"><table class="ftab"><thead><tr>'+
    '<th>Tarikh</th><th>Hari</th><th class="num">Guna</th><th class="num">Masuk</th><th class="num">Baki</th>'+
    '</tr></thead><tbody>';
  f.rows.slice(0,25).forEach(function(r){
    var cls=r.crit?"crit":(r.warn?"warn":(r.deliv>0?"ship":""));
    h+='<tr class="'+cls+'"><td class="mono">'+r.ds.slice(5)+'</td><td>'+dayName(r.ds)+'</td>'+
       '<td class="num mono">'+(r.use?r.use.toFixed(1):"—")+'</td>'+
       '<td class="num mono">'+(r.deliv?"+"+r.deliv:"—")+'</td>'+
       '<td class="num mono"><b>'+fmt(r.bal)+'</b></td></tr>';
  });
  h+='</tbody></table></div>'+
     '<p class="mini">🟡 kuning = bawah safety stock · 🔴 merah = stok habis · 🔵 biru = delivery masuk</p></div>';
  return h;
}

function planInputSec(m){
  var pf=state.planForm;
  var existing=state.plan.filter(function(p){return p.material===PLAN_MATERIAL;}).length;
  return '<div class="card"><span class="lbl">Set plan produksi (hari kerja sahaja)</span>'+
    '<div class="row2" style="margin-bottom:10px">'+
      '<div><span class="lbl">Dari</span><input type="date" value="'+pf.from+'" onchange="state.planForm.from=this.value"></div>'+
      '<div><span class="lbl">Hingga</span><input type="date" value="'+pf.to+'" onchange="state.planForm.to=this.value"></div>'+
    '</div>'+
    '<span class="lbl">Plan produksi (pcs sehari)</span>'+
    '<input type="number" min="0" value="'+pf.pcs+'" oninput="state.planForm.pcs=this.value" placeholder="700">'+
    '<p class="mini">'+ (m.pcsPerUnit? '1 '+m.unit+' = '+m.pcsPerUnit.toLocaleString()+' '+m.subUnit+
      ' → '+(Number(pf.pcs)&&m.pcsPerUnit?(Number(pf.pcs)/m.pcsPerUnit).toFixed(2)+' '+m.unit+'/hari':'') : '')+'</p>'+
    '<button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="savePlanRange()">Simpan Plan</button>'+
    '<p class="mini">Plan tersimpan: <b>'+existing+' hari</b>. Sabtu &amp; Ahad diskip automatik.</p>'+
    '</div>';
}

function planDeliverySec(f,m){
  var cfg=f.cfg;
  var saved=state.delivery.filter(function(d){return d.material===PLAN_MATERIAL;})
    .sort(function(a,b){return a.date<b.date?-1:1;});

  var h='<div class="card"><span class="lbl">Cadangan tarikh supplier hantar ('+cfg.shipmentSize+' '+m.unit+' setiap kali)</span>';
  if(!f.suggest.length){
    h+='<p class="mini" style="color:var(--green)">✓ Stok mencukupi — tiada delivery diperlukan dalam tempoh unjuran.</p>';
  }else{
    h+='<div style="overflow-x:auto"><table class="ftab"><thead><tr><th>Tarikh</th><th>Hari</th><th class="num">Qty</th><th></th></tr></thead><tbody>';
    f.suggest.slice(0,8).forEach(function(ds,i){
      h+='<tr'+(i<1?' class="crit"':'')+'><td class="mono">'+ds+'</td><td>'+dayName(ds)+'</td>'+
         '<td class="num mono">'+cfg.shipmentSize+'</td>'+
         '<td><button class="pill" onclick="addDelivery(\''+ds+'\','+cfg.shipmentSize+')">+ Simpan</button></td></tr>';
    });
    h+='</tbody></table></div><p class="mini">Tekan "+ Simpan" untuk masukkan delivery ke jadual (forecast akan kira semula).</p>';
  }
  h+='</div>';

  h+='<div class="card"><span class="lbl">Delivery disimpan</span>';
  if(!saved.length)h+='<p class="mini">Belum ada delivery disimpan.</p>';
  else{
    h+='<div style="overflow-x:auto"><table class="ftab"><thead><tr><th>Tarikh</th><th class="num">Qty</th><th>Status</th><th></th></tr></thead><tbody>';
    saved.forEach(function(d){
      h+='<tr class="ship"><td class="mono">'+d.date+'</td><td class="num mono">+'+d.qty+'</td>'+
         '<td>'+(d.status||"Planned")+'</td>'+
         '<td><button class="pill" onclick="delDelivery(\''+d.id+'\')" style="color:var(--out)">Padam</button></td></tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';
  return h;
}

function planSettingSec(cfg,m){
  return '<div class="card"><span class="lbl">Setting — '+PLAN_MATERIAL+'</span>'+
    '<div class="row2" style="margin-bottom:10px">'+
      '<div><span class="lbl">Safety stock ('+m.unit+')</span><input type="number" min="0" id="cfgSafety" value="'+cfg.safetyStock+'"></div>'+
      '<div><span class="lbl">Saiz 1 shipment</span><input type="number" min="0" id="cfgShip" value="'+cfg.shipmentSize+'"></div>'+
    '</div>'+
    '<div class="row2" style="margin-bottom:10px">'+
      '<div><span class="lbl">Lead time (hari)</span><input type="number" min="0" id="cfgLead" value="'+cfg.leadTime+'"></div>'+
      '<div><span class="lbl">Email alert</span><input type="email" id="cfgEmail" value="'+(cfg.alertEmail||"")+'" placeholder="nama@syarikat.com"></div>'+
    '</div>'+
    '<button class="btn btn-primary btn-sm" onclick="savePlanConfig()">Simpan Setting</button>'+
    '<p class="mini">Email alert: Apps Script akan hantar email bila baki ≤ safety stock (perlu set trigger harian sekali — lihat panduan).</p>'+
    '</div>';
}

// ---- Aksi tab Plan ----
function savePlanRange(){
  var pf=state.planForm, m=mat(PLAN_MATERIAL);
  var pcs=Number(pf.pcs);
  if(!pf.from||!pf.to){toast("Isi tarikh Dari & Hingga",false);return;}
  if(pf.to<pf.from){toast("Tarikh Hingga mesti selepas Dari",false);return;}
  if(!(pcs>=0)){toast("Plan pcs tidak sah",false);return;}
  var rows=[], ds=pf.from, guard=0;
  while(ds<=pf.to&&guard<400){guard++;
    if(isWorkday(ds))rows.push({date:ds,planPcs:pcs});
    ds=dAdd(ds,1);
  }
  if(!rows.length){toast("Tiada hari kerja dalam julat tu",false);return;}
  toast("Menyimpan plan…",true);
  apiPost({kind:"plan",material:PLAN_MATERIAL,rows:rows}).then(function(res){
    if(res.ok){
      state.plan=state.plan.filter(function(p){
        return !(p.material===PLAN_MATERIAL&&rows.some(function(r){return r.date===p.date;}));
      });
      rows.forEach(function(r){state.plan.push({date:r.date,material:PLAN_MATERIAL,planPcs:pcs});});
      setConn(true);toast("Plan disimpan ✓ ("+rows.length+" hari)",true);render();
    }else toast("Gagal: "+(res.error||"cuba lagi"),false);
  }).catch(function(){toast("Tiada internet",false);setConn(false);});
}

function savePlanConfig(){
  var g=function(id){var e=document.getElementById(id);return e?e.value:"";};
  var body={kind:"config",material:PLAN_MATERIAL,
    safetyStock:Number(g("cfgSafety"))||0, shipmentSize:Number(g("cfgShip"))||0,
    leadTime:Number(g("cfgLead"))||0, alertEmail:g("cfgEmail")};
  toast("Menyimpan setting…",true);
  apiPost(body).then(function(res){
    if(res.ok){
      state.config[PLAN_MATERIAL]={safetyStock:body.safetyStock,shipmentSize:body.shipmentSize,
        leadTime:body.leadTime,alertEmail:body.alertEmail};
      setConn(true);toast("Setting disimpan ✓",true);render();
    }else toast("Gagal: "+(res.error||"cuba lagi"),false);
  }).catch(function(){toast("Tiada internet",false);setConn(false);});
}

function addDelivery(ds,qty){
  var m=mat(PLAN_MATERIAL);
  var id=String(Date.now())+"_"+Math.floor(Math.random()*1000);
  toast("Menyimpan delivery…",true);
  apiPost({kind:"delivery",id:id,material:PLAN_MATERIAL,date:ds,qty:qty,unit:m.unit,status:"Planned",remarks:"Dari cadangan forecast"})
  .then(function(res){
    if(res.ok){
      state.delivery.push({id:id,material:PLAN_MATERIAL,date:ds,qty:qty,unit:m.unit,status:"Planned",remarks:""});
      setConn(true);toast("Delivery ditambah ✓",true);render();
    }else toast("Gagal: "+(res.error||"cuba lagi"),false);
  }).catch(function(){toast("Tiada internet",false);setConn(false);});
}

function delDelivery(id){
  if(!confirm("Padam delivery ni?"))return;
  toast("Memadam…",true);
  apiDeleteDelivery(id).then(function(res){
    if(res.ok){
      state.delivery=state.delivery.filter(function(d){return d.id!==id;});
      setConn(true);toast("Delivery dipadam ✓",true);render();
    }else toast("Gagal: "+(res.error||"cuba lagi"),false);
  }).catch(function(){toast("Tiada internet",false);setConn(false);});
}

function reportView(){
  var now=new Date(),m=mat(state.repMat);
  var h='<div class="seg row3" style="margin-bottom:8px">';
  MATERIALS.forEach(function(mm){
    var on=state.repMat===mm.id;
    h+='<button class="seg-btn" onclick="state.repMat=\''+mm.id+'\';render()" style="font-size:10px;'+(on?'background:'+mm.bg+';border-color:'+mm.color+';color:'+mm.color:'')+'">'+mm.id+'</button>';
  });
  h+='</div><div class="seg row2" style="margin-bottom:12px">';
  [["weekly","Weekly summary"],["daily","Daily detail"]].forEach(function(v){
    var on=state.repView===v[0];
    h+='<button class="seg-btn" onclick="state.repView=\''+v[0]+'\';render()" style="'+(on?'background:var(--surface);border-color:var(--faint);color:var(--text)':'')+'">'+v[1]+'</button>';
  });
  h+='</div>';
  h+='<div class="card" style="background:var(--surface2);display:flex;justify-content:space-between;align-items:center">'+
    '<div><span class="lbl">'+m.id+' · '+m.unit+'</span><p class="mono" style="font-size:12px;color:var(--muted);margin:2px 0 0">'+MONTHS[now.getMonth()]+' '+now.getFullYear()+'</p></div>'+
    '<button class="pill" onclick="exportCSV()" style="display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>Export CSV</button></div>';

  if(state.repView==="weekly"){
    var wk=getWeekly(state.repMat);
    h+='<div class="card"><table><thead><tr>'+
      '<th style="text-align:left">Wk</th><th style="text-align:left">Range</th>'+
      '<th style="text-align:right">Open</th><th style="text-align:right;color:var(--in)">IN</th>'+
      '<th style="text-align:right;color:var(--out)">OUT</th><th style="text-align:right;color:'+m.color+'">Bal</th></tr></thead><tbody>';
    wk.forEach(function(w){
      h+='<tr><td class="mono" style="color:var(--muted)">W'+w.wk+'</td>'+
        '<td class="mono" style="font-size:10px;color:var(--muted)">D'+w.s+'–'+w.e+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--muted)">'+w.open+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--in);font-weight:600">'+(w.tIn||"–")+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--out);font-weight:600">'+(w.tOut||"–")+'</td>'+
        '<td class="mono" style="text-align:right;color:'+m.color+';font-weight:600">'+w.close+'</td></tr>';
    });
    var totIn=wk.reduce(function(s,w){return s+w.tIn;},0),totOut=wk.reduce(function(s,w){return s+w.tOut;},0);
    h+='</tbody><tfoot><tr><td colspan="3" class="mono" style="font-size:9px;color:var(--muted)">MONTHLY TOTAL</td>'+
      '<td class="mono" style="text-align:right;color:var(--in)">'+totIn+'</td>'+
      '<td class="mono" style="text-align:right;color:var(--out)">'+totOut+'</td>'+
      '<td class="mono" style="text-align:right;color:'+m.color+'">'+(wk.length?wk[wk.length-1].close:0)+'</td></tr></tfoot></table></div>';
  }else{
    var dl=getDaily(state.repMat);
    h+='<div class="card"><table><thead><tr><th>No</th><th>Day</th><th style="text-align:center">Open</th><th style="text-align:center">In</th><th style="text-align:center">Out</th><th style="text-align:center">Bal</th></tr></thead><tbody>';
    dl.forEach(function(d){
      h+='<tr style="'+(d.isToday?'background:var(--blue-bg)':'')+'">'+
        '<td class="mono" style="text-align:center;color:'+(d.isToday?'var(--blue)':'var(--muted)')+'">'+d.d+'</td>'+
        '<td class="mono" style="text-align:center;font-size:9px;color:var(--muted)">'+d.day+'</td>'+
        '<td class="mono" style="text-align:center;font-size:10px;color:var(--muted)">'+(d.open||"–")+'</td>'+
        '<td class="mono" style="text-align:center;color:'+(d.in>0?'var(--in)':'var(--faint)')+'">'+(d.in>0?d.in:"–")+'</td>'+
        '<td class="mono" style="text-align:center;color:'+(d.out>0?'var(--out)':'var(--faint)')+'">'+(d.out>0?d.out:"–")+'</td>'+
        '<td class="mono" style="text-align:center;font-weight:600;color:'+(d.isToday?'var(--blue)':m.color)+'">'+d.bal+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}

function exportCSV(){
  var m=mat(state.repMat),now=new Date(),dl=getDaily(state.repMat);
  var csv="Material:,"+m.id+"\nUnit:,"+m.unit+"\nMonth:,"+MONTHS[now.getMonth()]+" "+now.getFullYear()+"\n\nNo,Date,Day,Opening,IN,OUT,Balance\n";
  csv+=dl.map(function(d){return d.d+","+d.ds+","+d.day+","+d.open+","+(d.in||0)+","+(d.out||0)+","+d.bal;}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="stock_"+state.repMat.replace(/ /g,"_")+"_"+mKey(today())+".csv";a.click();
  toast("CSV exported!",true);
}
