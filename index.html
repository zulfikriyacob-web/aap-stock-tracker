<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1d4a7a">
<title>AAP Stock Tracker — DM Line</title>
<style>
  :root{
    --bg:#07111f;
    --bg-elevated:#0b1728;
    --surface:#0f1d30;
    --surface2:#14243a;
    --surface3:#192b44;
    --glass:rgba(15,29,48,.82);
    --line:rgba(148,163,184,.16);
    --line-strong:rgba(148,163,184,.28);
    --text:#f4f7fb;
    --muted:#9aabc0;
    --faint:#63758b;
    --blue:#58a6ff;
    --blue-strong:#2f80ed;
    --blue-bg:rgba(47,128,237,.14);
    --amber:#f7b955;
    --amber-bg:rgba(247,185,85,.13);
    --green:#54d38a;
    --green-bg:rgba(84,211,138,.13);
    --in:#54d38a;
    --in-bg:rgba(84,211,138,.13);
    --out:#ff786b;
    --out-bg:rgba(255,120,107,.13);
    --info:#58a6ff;
    --purple:#b995ff;
    --shadow:0 20px 55px rgba(0,0,0,.24);
    --shadow-soft:0 10px 28px rgba(0,0,0,.16);
    --radius-xl:22px;
    --radius-lg:16px;
    --radius-md:12px;
    --sidebar:264px;
    --topbar:78px;
  }
  html[data-theme="light"]{
    --bg:#eef3f9;
    --bg-elevated:#f8fafc;
    --surface:#ffffff;
    --surface2:#f3f6fa;
    --surface3:#e8eef6;
    --glass:rgba(255,255,255,.86);
    --line:rgba(15,23,42,.10);
    --line-strong:rgba(15,23,42,.18);
    --text:#132238;
    --muted:#617087;
    --faint:#8b98aa;
    --blue:#1e73d8;
    --blue-strong:#175eb2;
    --blue-bg:rgba(30,115,216,.10);
    --amber:#b8750d;
    --amber-bg:rgba(184,117,13,.10);
    --green:#17834a;
    --green-bg:rgba(23,131,74,.10);
    --in:#17834a;
    --in-bg:rgba(23,131,74,.10);
    --out:#cf4337;
    --out-bg:rgba(207,67,55,.10);
    --purple:#7757bf;
    --shadow:0 18px 45px rgba(34,53,79,.10);
    --shadow-soft:0 8px 24px rgba(34,53,79,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;background:var(--bg);}
  body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    background:
      radial-gradient(circle at 8% 0%,rgba(47,128,237,.12),transparent 30%),
      radial-gradient(circle at 100% 18%,rgba(84,211,138,.08),transparent 24%),
      var(--bg);
    font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  button,input,select{font:inherit;}
  button{touch-action:manipulation;}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-variant-numeric:tabular-nums;}
  .app-shell{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);}
  .sidebar{
    position:sticky;top:0;height:100vh;z-index:40;
    display:flex;flex-direction:column;padding:22px 16px;
    background:linear-gradient(180deg,rgba(11,23,40,.98),rgba(7,17,31,.96));
    border-right:1px solid var(--line);
    overflow:hidden;
  }
  html[data-theme="light"] .sidebar{background:linear-gradient(180deg,#ffffff,#f4f7fb);}
  .sidebar:before{content:"";position:absolute;inset:-120px auto auto -100px;width:260px;height:260px;border-radius:50%;background:rgba(47,128,237,.13);filter:blur(12px);pointer-events:none;}
  .brand{position:relative;display:flex;align-items:center;gap:12px;padding:4px 8px 24px;}
  .brand-mark{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),var(--blue-strong));box-shadow:0 12px 30px rgba(47,128,237,.28);color:#fff;font-weight:900;letter-spacing:-.7px;}
  .brand-copy strong{display:block;font-size:14px;letter-spacing:.2px;}
  .brand-copy span{display:block;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
  .nav-label{padding:0 10px 8px;font-size:9px;font-weight:800;letter-spacing:1.4px;color:var(--faint);text-transform:uppercase;}
  .tabs{display:flex;flex-direction:column;gap:5px;}
  .tab{
    position:relative;width:100%;min-height:46px;padding:0 12px;border:1px solid transparent;border-radius:12px;
    display:flex;align-items:center;gap:12px;background:transparent;color:var(--muted);cursor:pointer;text-align:left;
    transition:background .2s ease,border-color .2s ease,color .2s ease,transform .2s ease;
  }
  .tab:hover{background:var(--surface2);color:var(--text);transform:translateX(2px);}
  .tab.active{background:linear-gradient(135deg,var(--blue-bg),rgba(88,166,255,.05));border-color:rgba(88,166,255,.22);color:var(--blue);box-shadow:inset 3px 0 0 var(--blue);}
  .tab svg{width:19px;height:19px;flex:0 0 auto;}
  .tab span{font-size:12px;font-weight:700;letter-spacing:.1px;}
  .tab .dot{position:absolute;right:12px;top:10px;width:7px;height:7px;border-radius:999px;background:var(--out);box-shadow:0 0 0 4px var(--out-bg);}
  .sidebar-foot{margin-top:auto;padding:14px 8px 2px;}
  .system-card{padding:13px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025);}
  .system-card .eyebrow{font-size:9px;color:var(--faint);font-weight:800;letter-spacing:1px;text-transform:uppercase;}
  .conn{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:10px;font-weight:800;letter-spacing:.7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);box-shadow:0 0 0 4px rgba(99,117,139,.12);}
  .dot.on{background:var(--green);box-shadow:0 0 0 4px var(--green-bg);}
  .dot.off{background:var(--out);box-shadow:0 0 0 4px var(--out-bg);}
  .workspace{min-width:0;}
  .topbar{
    position:sticky;top:0;z-index:30;height:var(--topbar);padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;gap:20px;
    background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-bottom:1px solid var(--line);
  }
  .page-heading{min-width:0;}
  .page-heading h1{margin:0;font-size:20px;line-height:1.2;letter-spacing:-.35px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .page-heading p{margin:4px 0 0;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top-actions{display:flex;align-items:center;gap:9px;}
  .clock-chip,.icon-btn,.top-sync{
    height:40px;border:1px solid var(--line);border-radius:11px;background:var(--surface);color:var(--muted);
    display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow-soft);
  }
  .clock-chip{padding:0 13px;font-size:11px;}
  .icon-btn{width:40px;cursor:pointer;}
  .top-sync{padding:0 14px;cursor:pointer;color:var(--text);font-size:11px;font-weight:800;}
  .icon-btn:hover,.top-sync:hover{border-color:var(--line-strong);background:var(--surface2);}
  .icon-btn svg,.top-sync svg{width:16px;height:16px;}
  .main{min-width:0;padding:26px 28px 56px;}
  .content{max-width:1440px;margin:0 auto;}
  .content.view-enter{animation:viewIn .42s cubic-bezier(.22,.61,.36,1) both;}
  @keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .content.view-enter>.stagger-item,.content.view-enter>.card,.content.view-enter>.kpi-grid,.content.view-enter>.material-grid,.content.view-enter>.home-lower{animation:staggerIn .48s both;}
  .content.view-enter>*:nth-child(2){animation-delay:.045s}.content.view-enter>*:nth-child(3){animation-delay:.09s}.content.view-enter>*:nth-child(4){animation-delay:.135s}.content.view-enter>*:nth-child(5){animation-delay:.18s}
  @keyframes staggerIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .page-intro{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:24px 26px;margin-bottom:18px;border:1px solid rgba(88,166,255,.18);border-radius:var(--radius-xl);background:linear-gradient(125deg,rgba(47,128,237,.18),rgba(15,29,48,.85) 48%,rgba(84,211,138,.07));box-shadow:var(--shadow);}
  html[data-theme="light"] .page-intro{background:linear-gradient(125deg,rgba(30,115,216,.12),#fff 50%,rgba(23,131,74,.06));}
  .page-intro:after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;right:-90px;top:-150px;background:rgba(88,166,255,.12);filter:blur(3px);}
  .intro-copy{position:relative;z-index:1;}
  .intro-copy .overline{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);}
  .intro-copy h2{font-size:25px;line-height:1.15;letter-spacing:-.55px;margin:7px 0 7px;}
  .intro-copy p{margin:0;color:var(--muted);font-size:12px;max-width:620px;}
  .intro-actions{position:relative;z-index:1;display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end;}
  .btn,.pill,.seg-btn,.qty-btn{transition:transform .15s ease,background .2s ease,border-color .2s ease,color .2s ease,box-shadow .2s ease;}
  .btn{min-height:46px;padding:0 17px;border-radius:12px;border:1px solid transparent;font-size:12px;font-weight:800;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-strong));color:#fff;box-shadow:0 12px 28px rgba(47,128,237,.24);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 16px 32px rgba(47,128,237,.3);}
  .btn-primary:active,.pill:active,.seg-btn:active,.qty-btn:active{transform:scale(.985);}
  .btn-secondary{background:var(--surface);border-color:var(--line);color:var(--text);}
  .btn-sm{min-height:40px;padding:0 14px;font-size:11px;border-radius:10px;}
  .quick-btn{width:auto;min-height:42px;}
  .card{background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface) 92%,transparent));border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-soft);}
  @supports not (background:color-mix(in srgb, white 50%, black)){.card{background:var(--surface);}}
  .card:hover{border-color:var(--line-strong);}
  .lbl{font-size:9px;font-weight:800;letter-spacing:1.25px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;}
  .mini{font-size:10px;color:var(--muted);margin:7px 0 0;line-height:1.55;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-bottom:22px;}
  .kpi-card{position:relative;overflow:hidden;min-height:124px;padding:17px;border:1px solid var(--line);border-radius:16px;background:var(--surface);box-shadow:var(--shadow-soft);}
  .kpi-card:after{content:"";position:absolute;width:84px;height:84px;border-radius:50%;right:-34px;bottom:-38px;background:var(--kpi-accent,var(--blue-bg));}
  .kpi-top{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .kpi-icon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--kpi-bg,var(--blue-bg));color:var(--kpi-color,var(--blue));}
  .kpi-icon svg{width:17px;height:17px;}
  .kpi-value{font-size:28px;font-weight:800;letter-spacing:-.8px;margin-top:13px;line-height:1;}
  .kpi-caption{font-size:10px;color:var(--muted);margin-top:7px;}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 2px 11px;}
  .section-head h3{margin:0;font-size:15px;letter-spacing:-.2px;}
  .section-head p{margin:2px 0 0;color:var(--muted);font-size:10px;}
  .material-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:22px;}
  .material-card{position:relative;overflow:hidden;padding:19px;border:1px solid var(--line);border-radius:18px;background:var(--surface);box-shadow:var(--shadow-soft);}
  .material-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--mat-color,var(--blue));}
  .material-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .material-name{font-size:13px;font-weight:800;margin:0;}
  .material-unit{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-top:2px;}
  .balance-line{display:flex;align-items:baseline;gap:7px;margin-top:17px;}
  .bal-num{font-size:38px;font-weight:800;line-height:1;letter-spacing:-1.2px;}
  .bal-unit{font-size:10px;color:var(--muted);}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;padding:5px 8px;border-radius:999px;letter-spacing:.45px;text-transform:uppercase;}
  .badge:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .progress{height:6px;background:var(--surface2);border-radius:999px;overflow:hidden;margin:15px 0 7px;}
  .progress>span{display:block;height:100%;border-radius:inherit;transition:width .5s ease;}
  .progress-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);}
  .material-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:15px;}
  .stat{padding:10px 11px;border-radius:11px;border:1px solid var(--line);background:var(--surface2);}
  .stat p{margin:0;}
  .stat .k{font-size:8px;letter-spacing:.85px;text-transform:uppercase;color:var(--muted);}
  .stat .v{font-size:16px;font-weight:800;margin-top:3px;}
  .material-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .material-actions .seg-btn{flex:1;min-width:88px;}
  .home-lower{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(280px,.7fr);gap:14px;align-items:start;}
  .activity-list{display:flex;flex-direction:column;}
  .activity-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .activity-row:last-child{border-bottom:0;padding-bottom:0;}
  .activity-row:first-child{padding-top:3px;}
  .activity-title{font-size:11px;font-weight:800;margin:0;}
  .activity-meta{font-size:9px;color:var(--muted);margin:3px 0 0;}
  .activity-qty{text-align:right;font-size:13px;font-weight:800;}
  .control-stack{display:grid;gap:9px;}
  .control-item{padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--surface2);}
  .control-item strong{font-size:11px;display:block;}
  .control-item p{font-size:9px;color:var(--muted);margin:4px 0 10px;}
  input,select{width:100%;height:46px;padding:0 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-size:12px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s ease,box-shadow .2s ease,background .2s ease;}
  input:hover,select:hover{border-color:var(--line-strong);}
  input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-bg);background:var(--surface);}
  input::placeholder{color:var(--faint);}
  input[type=date]{color-scheme:dark;}
  html[data-theme="light"] input[type=date]{color-scheme:light;}
  .seg{display:grid;gap:8px;}
  .seg-btn{min-height:40px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:10px;font-weight:800;background:var(--surface2);border:1px solid var(--line);color:var(--muted);text-align:center;}
  .seg-btn:hover{border-color:var(--line-strong);color:var(--text);background:var(--surface3);}
  .row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
  .row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
  .pill{min-height:34px;padding:0 12px;border-radius:999px;font-size:9px;font-weight:800;cursor:pointer;white-space:nowrap;background:var(--surface);border:1px solid var(--line);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;}
  .pill:hover{border-color:var(--line-strong);color:var(--text);}
  .pill.active{background:var(--text);color:var(--bg);border-color:var(--text);}
  .bal-card{border-left:3px solid;padding-left:16px;}
  .qty-row{display:flex;gap:8px;align-items:center;}
  .qty-btn{width:50px;height:50px;flex-shrink:0;background:var(--surface2);border:1px solid var(--line);border-radius:11px;color:var(--text);font-size:22px;cursor:pointer;}
  .qty-input{flex:1;text-align:center;font-size:24px;font-weight:800;padding:10px;}
  .alert-bar{background:linear-gradient(135deg,var(--out-bg),transparent);border:1px solid rgba(255,120,107,.28);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow-soft);}
  .alert-bar b{color:var(--out);font-size:11px;display:block;margin-bottom:3px;}
  .alert-bar p{margin:0;font-size:10px;color:var(--text);line-height:1.55;}
  .ftab{width:100%;border-collapse:separate;border-spacing:0;font-size:10px;}
  .ftab th{background:var(--surface2);color:var(--muted);font-size:8px;letter-spacing:.7px;text-transform:uppercase;padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);position:sticky;top:0;}
  .ftab td{padding:9px 8px;border-bottom:1px solid var(--line);color:var(--text);}
  .ftab tr:last-child td{border-bottom:0;}
  .ftab tr.warn td{background:var(--amber-bg);color:var(--amber);}
  .ftab tr.crit td{background:var(--out-bg);color:var(--out);font-weight:700;}
  .ftab tr.ship td{background:var(--blue-bg);}
  .ftab .num{text-align:right;font-variant-numeric:tabular-nums;}
  table{width:100%;border-collapse:collapse;table-layout:auto;}
  th{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 7px;border-bottom:1px solid var(--line);}
  td{padding:10px 7px;font-size:10px;border-bottom:1px solid var(--line);}
  tfoot td{border-top:1px solid var(--line-strong);border-bottom:none;font-weight:800;padding-top:11px;}
  .table-scroll{overflow:auto;border-radius:12px;}
  .toast{position:fixed;right:22px;bottom:22px;z-index:100;min-width:260px;max-width:min(420px,calc(100vw - 32px));padding:13px 16px;border-radius:13px;font-size:11px;font-weight:800;display:none;box-shadow:0 20px 50px rgba(0,0,0,.28);backdrop-filter:blur(12px);}
  .toast.show{display:block;animation:toastIn .28s ease both;}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.28);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:56px 18px;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:var(--surface);}
  .empty svg{width:34px;height:34px;opacity:.42;margin-bottom:8px;}
  .empty p{margin:0;font-size:11px;}
  .setup-warn{background:var(--out-bg);border:1px solid rgba(255,120,107,.32);color:var(--out);border-radius:13px;padding:13px 15px;font-size:10px;margin-bottom:14px;line-height:1.55;}
  .mobile-tabs{display:none;}
  .demo-ribbon{display:none;position:fixed;left:50%;top:8px;z-index:90;transform:translateX(-50%);padding:4px 10px;border-radius:999px;background:var(--amber-bg);border:1px solid rgba(247,185,85,.3);color:var(--amber);font-size:8px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
  body.demo-mode .demo-ribbon{display:block;}
  @media (min-width:901px){
    #content>.card:not(.alert-bar){max-width:none;}
    #content>.row2,#content>.row3{max-width:900px;}
  }
  @media (max-width:1180px){
    .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    .material-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    .material-grid .material-card:last-child{grid-column:span 2;}
  }
  @media (max-width:900px){
    :root{--topbar:64px;}
    .app-shell{display:block;}
    .sidebar{display:none;}
    .topbar{height:var(--topbar);padding:0 15px;}
    .page-heading h1{font-size:16px;}
    .page-heading p{font-size:9px;}
    .clock-chip{display:none;}
    .top-sync span{display:none;}
    .top-sync{width:40px;padding:0;}
    .main{padding:14px 12px 104px;}
    .mobile-tabs{position:fixed;left:10px;right:10px;bottom:10px;z-index:60;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:6px;border:1px solid var(--line);border-radius:18px;background:var(--glass);backdrop-filter:blur(18px);box-shadow:0 18px 50px rgba(0,0,0,.32);}
    .mobile-tabs .tab{min-height:54px;padding:6px 2px;gap:3px;flex-direction:column;justify-content:center;border-radius:12px;box-shadow:none;}
    .mobile-tabs .tab:hover{transform:none;}
    .mobile-tabs .tab.active{box-shadow:none;background:var(--blue-bg);}

<script>
// ============ DEPLOYMENT CONFIG ============
// Kekalkan URL Web App Google Apps Script anda di sini.
var API_URL = "https://script.google.com/macros/s/AKfycbwz3US4NBf3skmiQN2IU348NT1m45NfK-5JnjQJG000Eb8hdq752_PrA35cfVZx9a31Uw/exec";
// Tambah ?demo=1 pada URL GitHub Pages untuk ujian penuh tanpa menulis ke Google Sheet.
var DEMO_MODE = new URLSearchParams(window.location.search).get("demo") === "1";

// ============ CONFIG ============
var MATERIALS = [
  { id:"Bubble Wrap",  unit:"bag",   color:"var(--blue)",  bg:"var(--blue-bg)",  pcsPerUnit:200,  subUnit:"pcs", dailyUsage:4 },
  { id:"Glue Tribond", unit:"tubes", color:"var(--amber)", bg:"var(--amber-bg)", pcsPerUnit:1020, subUnit:"pcs", dailyUsage:1 },
  { id:"NPC Grease",   unit:"pail",  color:"var(--green)", bg:"var(--green-bg)", pcsPerUnit:15,   subUnit:"kg", dailyUsage:0.5 }
];
// Nota: dailyUsage = anggaran guna sehari (default) untuk satu line jalan.
//   Bubble 4 bag · Glue 1 tube · Grease 0.5 (kg/hari, dalam unit pail = 0.5kg).
//   Disimpan untuk kegunaan dashboard akan datang (forecast / reorder estimate).
// ---- Tab PLAN: material yang di-cover (buat masa ni Bubble Wrap sahaja) ----
var PLAN_MATERIAL = "Bubble Wrap";
var PLAN_DEFAULTS = { safetyStock:12, shipmentSize:15, leadTime:10, alertEmail:"" };
var PLAN_HORIZON = 45; // berapa hari kerja nak unjur ke depan

var LINES = ["Door Mirror","Outer Handle","Pass Thru","Open Stay","Stock Baru Masuk","Other"];
var SHIFTS = ["Morning","Afternoon","Night"];
var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ============ STATE ============
var state = {
  tab:"home", records:[], openings:{}, loading:true, online:false,
  form:{ material:"Bubble Wrap", date:today(), shift:"Morning", line:"Door Mirror", operator:"", type:"OUT", qty:"", remarks:"" },
  histFilter:"all", repMat:"Bubble Wrap", repView:"weekly", saving:false, editDate:today(),
  // ---- tab Plan ----
  config:{}, plan:[], delivery:[], planSection:"forecast",
  planForm:{ from:today(), to:"", pcs:"700" }
};

function today(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return String(n).padStart(2,"0");}
function mKey(ds){return ds.slice(0,7);}
function dayName(ds){return DAYS[new Date(ds+"T12:00:00").getDay()];}
function mat(id){return MATERIALS.find(function(m){return m.id===id;});}
// Papar nombor kemas: 15 -> "15", 12.4 -> "12.4"
function fmt(n){n=Number(n)||0;return (Math.round(n*10)/10).toString();}
// Pulangkan string "= X pcs" kalau material ada conversion, else "".
function subQty(matId,qty){
  var m=mat(matId);
  if(!m||!m.pcsPerUnit||!qty)return "";
  return "= "+(qty*m.pcsPerUnit).toLocaleString()+" "+m.subUnit;
}

// Opening stock disimpan local kat phone (localStorage), sebab dia setup sekali je per bulan
function loadOpenings(){try{return JSON.parse(localStorage.getItem("aap_openings")||"{}");}catch(e){return {};}}
function saveOpenings(o){try{localStorage.setItem("aap_openings",JSON.stringify(o));}catch(e){}}

// ============ API ============
var DEMO_DB=null;
function demoDB(){
  if(DEMO_DB)return DEMO_DB;
  try{var cached=JSON.parse(localStorage.getItem("aap_demo_command_center")||"null");if(cached){DEMO_DB=cached;return DEMO_DB;}}catch(e){}
  var base=today(),openDate=dAdd(base,-12);
  var records=[
    {id:"demo_open_1",material:"Bubble Wrap",type:"OPENING",qty:38,unit:"bag",line:"-",shift:"-",operator:"Opening",date:openDate,remarks:"Monthly opening stock",timestamp:new Date().toISOString()},
    {id:"demo_open_2",material:"Glue Tribond",type:"OPENING",qty:18,unit:"tubes",line:"-",shift:"-",operator:"Opening",date:openDate,remarks:"Monthly opening stock",timestamp:new Date().toISOString()},
    {id:"demo_open_3",material:"NPC Grease",type:"OPENING",qty:12,unit:"pail",line:"-",shift:"-",operator:"Opening",date:openDate,remarks:"Monthly opening stock",timestamp:new Date().toISOString()},
    {id:"demo_1",material:"Bubble Wrap",type:"OUT",qty:4,unit:"bag",line:"Door Mirror",shift:"Morning",operator:"Aiman",date:dAdd(base,-3),remarks:"Production use",timestamp:new Date(Date.now()-260000000).toISOString()},
    {id:"demo_2",material:"Glue Tribond",type:"OUT",qty:2,unit:"tubes",line:"Outer Handle",shift:"Morning",operator:"Farah",date:dAdd(base,-2),remarks:"Production use",timestamp:new Date(Date.now()-170000000).toISOString()},
    {id:"demo_3",material:"Bubble Wrap",type:"OUT",qty:5,unit:"bag",line:"Door Mirror",shift:"Morning",operator:"Aiman",date:dAdd(base,-1),remarks:"Production use",timestamp:new Date(Date.now()-85000000).toISOString()},
    {id:"demo_4",material:"NPC Grease",type:"OUT",qty:1,unit:"pail",line:"Pass Thru",shift:"Afternoon",operator:"Kumar",date:base,remarks:"Top-up line",timestamp:new Date(Date.now()-4200000).toISOString()},
    {id:"demo_5",material:"Bubble Wrap",type:"IN",qty:15,unit:"bag",line:"Stock Baru Masuk",shift:"Morning",operator:"Store",date:base,remarks:"Supplier delivery",timestamp:new Date(Date.now()-2200000).toISOString()},
    {id:"demo_6",material:"Glue Tribond",type:"OUT",qty:1,unit:"tubes",line:"Door Mirror",shift:"Afternoon",operator:"Lina",date:base,remarks:"Production use",timestamp:new Date(Date.now()-900000).toISOString()}
  ];
  var plan=[],ds=base,added=0;
  while(added<28){if(isWorkday(ds)){plan.push({date:ds,material:"Bubble Wrap",planPcs:700});added++;}ds=dAdd(ds,1);}
  DEMO_DB={records:records,config:{"Bubble Wrap":{safetyStock:12,shipmentSize:15,leadTime:10,alertEmail:"planner@example.com"}},plan:plan,delivery:[{id:"demo_delivery",material:"Bubble Wrap",date:dAdd(base,8),qty:15,unit:"bag",status:"Planned",remarks:"Demo shipment"}]};
  demoPersist();return DEMO_DB;
}
function demoPersist(){try{localStorage.setItem("aap_demo_command_center",JSON.stringify(DEMO_DB));}catch(e){}}
function demoReply(payload){return new Promise(function(resolve){setTimeout(function(){resolve(payload);},180);});}
function apiFetch(url,options){
  var ctrl=window.AbortController?new AbortController():null;
  var timer=ctrl?setTimeout(function(){ctrl.abort();},15000):null;
  options=options||{};options.cache="no-store";if(ctrl)options.signal=ctrl.signal;
  return fetch(url,options).then(function(r){if(timer)clearTimeout(timer);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
}
function apiList(){
  if(DEMO_MODE)return demoReply({ok:true,records:demoDB().records.slice()});
  return apiFetch(API_URL+"?action=list&_="+Date.now());
}
function apiSave(rec){
  if(DEMO_MODE){var db=demoDB();db.records.push(Object.assign({timestamp:new Date().toISOString()},rec));demoPersist();return demoReply({ok:true});}
  return apiFetch(API_URL,{method:"POST",body:JSON.stringify(rec)});
}
function apiMeta(){
  if(DEMO_MODE){var db=demoDB();return demoReply({ok:true,config:db.config,plan:db.plan,delivery:db.delivery});}
  return apiFetch(API_URL+"?action=meta&_="+Date.now());
}
function apiPost(obj){
  if(DEMO_MODE){
    var db=demoDB();
    if(obj.kind==="plan")obj.rows.forEach(function(row){db.plan=db.plan.filter(function(p){return !(p.material===obj.material&&p.date===row.date);});db.plan.push({date:row.date,material:obj.material,planPcs:row.planPcs});});
    if(obj.kind==="config")db.config[obj.material]={safetyStock:obj.safetyStock,shipmentSize:obj.shipmentSize,leadTime:obj.leadTime,alertEmail:obj.alertEmail};
    if(obj.kind==="delivery")db.delivery.push({id:obj.id,material:obj.material,date:obj.date,qty:obj.qty,unit:obj.unit,status:obj.status,remarks:obj.remarks});
    demoPersist();return demoReply({ok:true});
  }
  return apiFetch(API_URL,{method:"POST",body:JSON.stringify(obj)});
}
function apiDeleteDelivery(id){
  if(DEMO_MODE){var db=demoDB();db.delivery=db.delivery.filter(function(d){return d.id!==id;});demoPersist();return demoReply({ok:true});}
  return apiFetch(API_URL+"?action=deleteDelivery&id="+encodeURIComponent(id));
}
function apiDelete(id){
  if(DEMO_MODE){var db=demoDB();db.records=db.records.filter(function(r){return r.id!==id;});demoPersist();return demoReply({ok:true});}
  return apiFetch(API_URL+"?action=delete&id="+encodeURIComponent(id));
}

function setConn(on){
  state.online=on;
  var dot=document.getElementById("connDot"),txt=document.getElementById("connTxt");
  if(dot)dot.className="dot "+(on?"on":"off");
  if(txt){txt.textContent=DEMO_MODE?"DEMO DATA":(on?"ONLINE":"OFFLINE");txt.style.color=DEMO_MODE?"var(--amber)":(on?"var(--green)":"var(--out)");}
}

function refresh(){
  if(API_URL.indexOf("PASTE_")===0&&!DEMO_MODE){state.loading=false;render();return;}
  return Promise.all([apiList(),apiMeta().catch(function(){return {ok:false};})])
    .then(function(res){
      var list=res[0], meta=res[1];
      if(list.ok){state.records=list.records||[];setConn(true);}
      else setConn(false);
      if(meta&&meta.ok)loadMeta(meta);
      state.loading=false;render();
    }).catch(function(){setConn(false);state.loading=false;render();});
}
function loadMeta(meta){
  state.config=meta.config||{};
  state.plan=meta.plan||[];
  state.delivery=meta.delivery||[];
}
// Config utk material Plan — guna nilai dari Sheet, fallback ke default.
function planCfg(){
  var c=state.config[PLAN_MATERIAL]||{};
  return {
    safetyStock: c.safetyStock||PLAN_DEFAULTS.safetyStock,
    shipmentSize: c.shipmentSize||PLAN_DEFAULTS.shipmentSize,
    leadTime: c.leadTime||PLAN_DEFAULTS.leadTime,
    alertEmail: c.alertEmail||PLAN_DEFAULTS.alertEmail
  };
}

// Manual sync — dipanggil bila user tekan button Sync. Bagi feedback jelas.
function doSync(btn){
  if(API_URL.indexOf("PASTE_")===0&&!DEMO_MODE){toast("App belum disetup",false);return;}
  if(btn){btn.disabled=true;btn.dataset.busy="1";}
  var icon=btn&&btn.querySelector("svg");
  if(icon){icon.style.transition="transform .6s ease";icon.style.transform="rotate(360deg)";}
  var before=state.records.length;
  apiList().then(function(res){
    if(res.ok){
      state.records=res.records||[];setConn(true);
      var diff=state.records.length-before;
      if(diff>0)toast("Sync ✓ — "+diff+" rekod baru ditambah",true);
      else toast("Sync ✓ — data sudah terkini",true);
    }else{setConn(false);toast("Sync gagal — cuba lagi",false);}
    render();
  }).catch(function(){setConn(false);toast("Tiada internet — sync gagal",false);render();});
}

// Muat semula data dari Google Sheet (buang cache paparan, tarik fresh)
function resetLocal(){
  var yes=confirm("Muat semula semua data dari Google Sheet?\n\nIni akan tarik data terkini (termasuk opening stock & balance) dari Sheet.\n\nTeruskan?");
  if(!yes)return;
  try{localStorage.removeItem("aap_openings");}catch(e){}
  toast("Memuat semula…",true);
  apiList().then(function(res){
    if(res.ok){state.records=res.records||[];setConn(true);toast("Data dimuat semula ✓",true);}
    else{setConn(false);toast("Gagal muat semula",false);}
    go("home");
  }).catch(function(){setConn(false);toast("Tiada internet",false);});
}

// ============ CALC ============
// Cari entry OPENING terkini (paling lewat tarikh) utk satu material. Ni jadi "anchor".
function latestOpening(matId){
  var ops=state.records.filter(function(r){return r.material===matId&&r.type==="OPENING"&&r.date;});
  if(!ops.length)return null;
  ops.sort(function(a,b){ if(a.date!==b.date)return a.date<b.date?1:-1; return new Date(b.timestamp||0)-new Date(a.timestamp||0); });
  return ops[0]; // yang paling lewat
}
// Nilai opening stock semasa (qty dari anchor OPENING terkini).
function getOpening(matId){
  var op=latestOpening(matId);
  return op?Number(op.qty):undefined;
}
// Tarikh opening terkini.
function getOpeningDate(matId){
  var op=latestOpening(matId);
  return op?op.date:undefined;
}
// Baki pada tarikh 'end' — guna OPENING TERKINI yang <= end sebagai anchor.
// (Penting: opening selepas 'end' tidak boleh jadi anchor, kalau tidak baki sejarah jadi salah.)
function balanceAsOf(matId,end){
  end=end||today();
  var ops=state.records.filter(function(r){
    return r.material===matId&&r.type==="OPENING"&&r.date&&r.date<=end;
  });
  ops.sort(function(a,b){
    if(a.date!==b.date)return a.date<b.date?1:-1;
    return new Date(b.timestamp||0)-new Date(a.timestamp||0);
  });
  var base=ops.length?Number(ops[0].qty):0;
  var from=ops.length?ops[0].date:"0000-00-00";
  var recs=state.records.filter(function(r){
    return r.material===matId&&r.date&&r.date>=from&&r.date<=end&&(r.type==="IN"||r.type==="OUT");
  });
  var inT=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
  var outT=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
  return base+inT-outT;
}
// Balance = opening terkini + (IN − OUT) dari tarikh opening ke 'end'. Entry sebelum opening diabaikan.
function calcBalance(matId,end){
  return balanceAsOf(matId,end||today());
}
function todayStat(matId,type){
  return state.records.filter(function(r){return r.material===matId&&r.date===today()&&r.type===type;})
    .reduce(function(s,r){return s+Number(r.qty);},0);
}

// ============ NAV ============
var PAGE_META={
  home:["Command Center","Live consumable inventory visibility and control"],
  record:["New Transaction","Record material movement with balance preview"],

}

  var c=document.getElementById("content");if(!c)return;
  c.classList.remove("view-enter");void c.offsetWidth;c.classList.add("view-enter");

function toggleTheme(){

function initChrome(){

function tickClock(){

  var d=new Date();e.textContent=d.toLocaleDateString("en-MY",{day:"2-digit",month:"short"})+" · "+d.toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit",hour12:false});

function quickRecord(material,type){state.form.material=material;state.form.type=type||"OUT";state.form.qty="";go("record");}

function toast(msg,ok){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=ok?"var(--in-bg)":"var(--out-bg)";
  t.style.color=ok?"#9fe3b3":"#f0a99e";
  t.style.border="1px solid "+(ok?"var(--in)":"var(--out)");
  t.className="toast show";

// ============ RENDER ============
function render(){
  var c=document.getElementById("content"),html="";
  if(state.loading){html='<div class="empty"><div class="spinner" style="border-top-color:var(--blue);margin-bottom:10px"></div><p>Loading operational data…</p></div>';}
  else if(API_URL.indexOf("PASTE_")===0&&!DEMO_MODE){html='<div class="setup-warn"><b>⚙️ API belum disetup</b><br>Gantikan API_URL dengan URL Web App Google Apps Script. Untuk preview tanpa backend, buka fail ini dengan <code>?demo=1</code>.</div>'+homeView();}
  else if(state.tab==="home")html=homeView();
  else if(state.tab==="record")html=recordView();
  else if(state.tab==="edit")html=editView();
  else if(state.tab==="plan")html=planView();
  else if(state.tab==="history")html=historyView();
  else if(state.tab==="report")html=reportView();
  c.innerHTML=html;updatePlanBadge();updateChrome();animateContent();
}

// Titik merah kat tab Plan bila baki <= safety stock
function updatePlanBadge(){
  var tabs=document.querySelectorAll('.tab[data-tab="plan"]');
  tabs.forEach(function(tab){var old=tab.querySelector(".dot");if(old)old.remove();});
  if(state.loading||!state.records.length)return;
  var cfg=planCfg();
  if(calcBalance(PLAN_MATERIAL)<=cfg.safetyStock){
    tabs.forEach(function(tab){var d=document.createElement("span");d.className="dot";tab.appendChild(d);});
  }
}

function updatePreview(){
  var f=state.form,m=mat(f.material),cur=calcBalance(f.material);
  var nb=cur+(f.type==="IN"?1:-1)*(Number(f.qty)||0);
  var el=document.getElementById("preview");
  if(el){el.textContent=cur+' '+(f.type==="IN"?"+":"-")+' '+(Number(f.qty)||0)+' = '+nb+' '+m.unit;el.style.color=nb<0?'var(--out)':m.color;}
  if(m.pcsPerUnit){
    var pp=document.getElementById("previewPcs"); if(pp)pp.textContent=subQty(m.id,nb);
    var qp=document.getElementById("qtyPcs");
    if(qp)qp.textContent=Number(f.qty)?subQty(f.material,Number(f.qty)):'1 '+m.unit+' = '+m.pcsPerUnit.toLocaleString()+' '+m.subUnit;
  }
}
function stepQty(d){
  var v=Math.max(0,(Number(state.form.qty)||0)+d);
  state.form.qty=String(v);
  var el=document.getElementById("qtyInput");if(el)el.value=v;
  updatePreview();
}
function setForm(k,v){state.form[k]=v;if(state.tab==="record")render();}

function doSave(){
  var f=state.form;
  if(!f.operator.trim()){toast("Nama operator wajib diisi!",false);return;}
  var qty=parseFloat(f.qty);
  if(!qty||qty<=0){toast("Quantity tidak sah!",false);return;}
  var m=mat(f.material);
  var id=String(Date.now())+"_"+Math.floor(Math.random()*1000);
  var rec={id:id,material:f.material,type:f.type,qty:qty,unit:m.unit,line:f.line,shift:f.shift,operator:f.operator.trim(),date:f.date,remarks:f.remarks.trim()};
  var btn=document.getElementById("saveBtn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Menyimpan…';
  apiSave(rec).then(function(res){
    if(res.ok){
      state.records.push(Object.assign({timestamp:new Date().toISOString()},rec));
      state.form.qty="";state.form.remarks="";
      toast("Rekod berjaya disimpan ✓",true);
      setConn(true);go("home");
    }else{toast("Gagal: "+(res.error||"cuba lagi"),false);btn.disabled=false;render();}
  }).catch(function(){toast("Tiada internet — cuba lagi",false);setConn(false);btn.disabled=false;render();});
}

function editOpening(matId){
  var m=mat(matId);
  var cur=getOpening(matId);
  var curDate=getOpeningDate(matId);
  var val=prompt("Set opening stock untuk "+matId+":\n\nMasukkan baki sebenar dari stock check.\n\nNota: balance akan dikira BERMULA dari tarikh opening ni (entry sebelum tarikh ini diabaikan). Ganti opening sedia ada & sync ke Google Sheet.",cur!==undefined?cur:"");
  if(val===null)return;
  var n=parseFloat(val);if(isNaN(n)){toast("Nilai tidak sah",false);return;}
  // Minta tarikh opening (default: tarikh opening sedia ada, atau hari ni)
  var defDate=curDate||today();
  var dStr=prompt("Tarikh stock check / opening untuk "+matId+":\n\nFormat: YYYY-MM-DD (contoh 2026-06-20)\n\nBalance akan dikira bermula dari tarikh ni.",defDate);
  if(dStr===null)return;
  dStr=dStr.trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(dStr)){toast("Format tarikh salah (guna YYYY-MM-DD)",false);return;}
  var id=String(Date.now())+"_"+Math.floor(Math.random()*1000);
  var rec={id:id,material:matId,type:"OPENING",qty:n,unit:m.unit,line:"-",shift:"-",operator:"Opening",date:dStr,remarks:"Opening stock (stock check "+dStr+")"};
  toast("Menyimpan opening…",true);
  apiSave(rec).then(function(res){
    if(res.ok){
      // buang OPENING tarikh SAMA je dari state (pembetulan), kekalkan sejarah lain
      state.records=state.records.filter(function(r){return !(r.material===matId&&r.type==="OPENING"&&r.date===dStr);});
      state.records.push(Object.assign({timestamp:new Date().toISOString()},rec));
      setConn(true);toast("Opening stock disimpan ✓",true);go("home");
    }else{toast("Gagal: "+(res.error||"cuba lagi"),false);}
  }).catch(function(){toast("Tiada internet — cuba lagi",false);setConn(false);});
}

function getWeekly(matId){
  var now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  var ms=y+"-"+pad(mo+1),dim=new Date(y,mo+1,0).getDate();
  // Baki bawa masuk dari bulan sebelum (bukan 0).
  var bal=balanceAsOf(matId,dAdd(ms+"-01",-1));
  var weeks=[[1,7],[8,14],[15,21],[22,28],[29,31]].filter(function(w){return w[0]<=dim;});
  return weeks.map(function(w,i){
    var from=ms+"-"+pad(w[0]),to=ms+"-"+pad(Math.min(w[1],dim));
    var recs=state.records.filter(function(r){return r.material===matId&&r.date>=from&&r.date<=to;});
    var opW=recs.filter(function(r){return r.type==="OPENING";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var hasOpW=recs.some(function(r){return r.type==="OPENING";});
    var tIn=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var tOut=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var open=hasOpW?opW:bal;
    bal=open+tIn-tOut;
    return {wk:i+1,s:w[0],e:Math.min(w[1],dim),open:open,tIn:tIn,tOut:tOut,close:bal,reset:hasOpW};
  });
}
function getDaily(matId){
  var now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  var ms=y+"-"+pad(mo+1),dim=new Date(y,mo+1,0).getDate();
  // Baki BAWA MASUK dari sebelum bulan ni (bukan 0) — kalau tidak, Report jadi negatif.
  var bal=balanceAsOf(matId,dAdd(ms+"-01",-1));
  var tdy=today(),out=[];
  for(var d=1;d<=dim;d++){
    var ds=ms+"-"+pad(d);
    var recs=state.records.filter(function(r){return r.material===matId&&r.date===ds;});
    var opDay=recs.filter(function(r){return r.type==="OPENING";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var hasOpDay=recs.some(function(r){return r.type==="OPENING";});
    var tIn=recs.filter(function(r){return r.type==="IN";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var tOut=recs.filter(function(r){return r.type==="OUT";}).reduce(function(s,r){return s+Number(r.qty);},0);
    var open=bal;
    // Kalau hari ni ada OPENING (stock check), RESET balance ke nilai opening, baru tolak/tambah IN/OUT hari tu.
    if(hasOpDay)bal=opDay+tIn-tOut;
    else bal=open+tIn-tOut;
    out.push({d:d,ds:ds,day:dayName(ds),open:hasOpDay?opDay:open,in:tIn,out:tOut,bal:bal,isToday:ds===tdy,reset:hasOpDay});
  }
  return out;
}

// ================= PLAN: enjin forecast =================
function dAdd(ds,n){var d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function isWorkday(ds){var w=new Date(ds+"T00:00:00").getDay();return w>=1&&w<=5;}

// Plan pcs utk satu tarikh. Kalau takde plan, guna purata plan sedia ada; kalau langsung takde, guna default.
function planPcsFor(ds){
  var hit=state.plan.filter(function(p){return p.material===PLAN_MATERIAL&&p.date===ds;});
  if(hit.length)return Number(hit[0].planPcs)||0;
  var all=state.plan.filter(function(p){return p.material===PLAN_MATERIAL&&p.planPcs>0;});
  if(all.length)return all.reduce(function(s,p){return s+Number(p.planPcs);},0)/all.length;
  return 0;
}
// Guna/hari dalam UNIT (bag) — dari plan pcs ÷ pcsPerUnit. Fallback ke dailyUsage material.
function usageFor(ds){
  var m=mat(PLAN_MATERIAL);
  var pcs=planPcsFor(ds);
  if(pcs>0&&m.pcsPerUnit)return pcs/m.pcsPerUnit;
  return m.dailyUsage||0;
}
function deliveryOn(ds){
  return state.delivery.filter(function(d){return d.material===PLAN_MATERIAL&&d.date===ds;})
    .reduce(function(s,d){return s+Number(d.qty);},0);
}

/**
 * Unjuran ke depan. Pulangkan { rows, suggest, runoutDate }
 *  rows   = [{ds,use,deliv,bal,warn,crit}]  (guna delivery yg DAH disimpan)
 *  suggest= [tarikh] cadangan bila supplier kena hantar (kalau ikut delivery sedia ada tak cukup)
 */
function forecast(){
  var cfg=planCfg();
  var bal=calcBalance(PLAN_MATERIAL);
  var simBal=bal;              // untuk cadangan (auto-ship)
  var rows=[], suggest=[], runout=null;
  // Mula dari HARI ESOK — baki semasa dah termasuk penggunaan hari ni.
  // (Kalau mula hari ni, guna hari ni dikira dua kali.)
  var ds=dAdd(today(),1), count=0, guard=0;

  while(count<PLAN_HORIZON&&guard<200){
    guard++;
    if(!isWorkday(ds)){ds=dAdd(ds,1);continue;}
    var use=usageFor(ds);
    var deliv=deliveryOn(ds);

    // baris sebenar (ikut delivery yang dah disimpan)
    bal=bal+deliv-use;
    if(bal<=0&&!runout)runout=ds;

    // simulasi cadangan: kalau baki akan jatuh bawah safety, shipment kena sampai hari ni
    var shipToday=0;
    var afterUse=simBal+deliv-use;
    if(afterUse<cfg.safetyStock&&cfg.shipmentSize>0){
      shipToday=cfg.shipmentSize;
      suggest.push(ds);
    }
    simBal=simBal+deliv+shipToday-use;

    rows.push({ds:ds,use:use,deliv:deliv,bal:bal,
      warn:(bal>0&&bal<=cfg.safetyStock),crit:(bal<=0)});
    count++; ds=dAdd(ds,1);
  }
  return {rows:rows,suggest:suggest,runout:runout,startBal:calcBalance(PLAN_MATERIAL),cfg:cfg};
}

// ---- Aksi tab Plan ----
function savePlanRange(){
  var pf=state.planForm, m=mat(PLAN_MATERIAL);
  var pcs=Number(pf.pcs);
  if(!pf.from||!pf.to){toast("Isi tarikh Dari & Hingga",false);return;}
  if(pf.to<pf.from){toast("Tarikh Hingga mesti selepas Dari",false);return;}
  if(!(pcs>=0)){toast("Plan pcs tidak sah",false);return;}
  var rows=[], ds=pf.from, guard=0;
  while(ds<=pf.to&&guard<400){guard++;
    if(isWorkday(ds))rows.push({date:ds,planPcs:pcs});
    ds=dAdd(ds,1);
  }
  if(!rows.length){toast("Tiada hari kerja dalam julat tu",false);return;}
  toast("Menyimpan plan…",true);
  apiPost({kind:"plan",material:PLAN_MATERIAL,rows:rows}).then(function(res){
    if(res.ok){
      state.plan=state.plan.filter(function(p){
        return !(p.material===PLAN_MATERIAL&&rows.some(function(r){return r.date===p.date;}));
      });
      rows.forEach(function(r){state.plan.push({date:r.date,material:PLAN_MATERIAL,planPcs:pcs});});
      setConn(true);toast("Plan disimpan ✓ ("+rows.length+" hari)",true);render();
    }else toast("Gagal: "+(res.error||"cuba lagi"),false);
  }).catch(function(){toast("Tiada internet",false);setConn(false);});
}

    h+='<div class="card"><table><thead><tr>'+
      '<th style="text-align:left">Wk</th><th style="text-align:left">Range</th>'+
      '<th style="text-align:right">Open</th><th style="text-align:right;color:var(--in)">IN</th>'+
      '<th style="text-align:right;color:var(--out)">OUT</th><th style="text-align:right;color:'+m.color+'">Bal</th></tr></thead><tbody>';
    wk.forEach(function(w){
      h+='<tr><td class="mono" style="color:var(--muted)">W'+w.wk+'</td>'+
        '<td class="mono" style="font-size:10px;color:var(--muted)">D'+w.s+'–'+w.e+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--muted)">'+w.open+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--in);font-weight:600">'+(w.tIn||"–")+'</td>'+
        '<td class="mono" style="text-align:right;color:var(--out);font-weight:600">'+(w.tOut||"–")+'</td>'+
        '<td class="mono" style="text-align:right;color:'+m.color+';font-weight:600">'+w.close+'</td></tr>';
    });
    var totIn=wk.reduce(function(s,w){return s+w.tIn;},0),totOut=wk.reduce(function(s,w){return s+w.tOut;},0);
    h+='</tbody><tfoot><tr><td colspan="3" class="mono" style="font-size:9px;color:var(--muted)">MONTHLY TOTAL</td>'+
      '<td class="mono" style="text-align:right;color:var(--in)">'+totIn+'</td>'+
      '<td class="mono" style="text-align:right;color:var(--out)">'+totOut+'</td>'+
      '<td class="mono" style="text-align:right;color:'+m.color+'">'+(wk.length?wk[wk.length-1].close:0)+'</td></tr></tfoot></table></div>';
  }else{
    var dl=getDaily(state.repMat);
    h+='<div class="card"><table><thead><tr><th>No</th><th>Day</th><th style="text-align:center">Open</th><th style="text-align:center">In</th><th style="text-align:center">Out</th><th style="text-align:center">Bal</th></tr></thead><tbody>';
    dl.forEach(function(d){
      h+='<tr style="'+(d.isToday?'background:var(--blue-bg)':'')+'">'+
        '<td class="mono" style="text-align:center;color:'+(d.isToday?'var(--blue)':'var(--muted)')+'">'+d.d+'</td>'+
        '<td class="mono" style="text-align:center;font-size:9px;color:var(--muted)">'+d.day+'</td>'+
        '<td class="mono" style="text-align:center;font-size:10px;color:var(--muted)">'+(d.open||"–")+'</td>'+
        '<td class="mono" style="text-align:center;color:'+(d.in>0?'var(--in)':'var(--faint)')+'">'+(d.in>0?d.in:"–")+'</td>'+
        '<td class="mono" style="text-align:center;color:'+(d.out>0?'var(--out)':'var(--faint)')+'">'+(d.out>0?d.out:"–")+'</td>'+
        '<td class="mono" style="text-align:center;font-weight:600;color:'+(d.isToday?'var(--blue)':m.color)+'">'+d.bal+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}

function exportCSV(){
  var m=mat(state.repMat),now=new Date(),dl=getDaily(state.repMat);
  var csv="Material:,"+m.id+"\nUnit:,"+m.unit+"\nMonth:,"+MONTHS[now.getMonth()]+" "+now.getFullYear()+"\n\nNo,Date,Day,Opening,IN,OUT,Balance\n";
  csv+=dl.map(function(d){return d.d+","+d.ds+","+d.day+","+d.open+","+(d.in||0)+","+(d.out||0)+","+d.bal;}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="stock_"+state.repMat.replace(/ /g,"_")+"_"+mKey(today())+".csv";a.click();
  toast("CSV exported!",true);
}

// ============ INIT ============
initChrome();
render();
refresh();
window.addEventListener("keydown",function(e){
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();go("record");}
  if(e.altKey&&/[1-6]/.test(e.key)){e.preventDefault();go(["home","record","edit","plan","history","report"][Number(e.key)-1]);}
});
</script>
